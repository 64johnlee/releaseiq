name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # typecheck + lint + tests with coverage thresholds (no secrets needed:
      # tests mock the LLM and use in-process PGlite).
      - run: npm run verify
      - run: npm run build
